apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://github.com/GVengelen/grafana.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: "18.5.24"
      helm:
        valueFiles:
          - $values/charts/postgresql/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
